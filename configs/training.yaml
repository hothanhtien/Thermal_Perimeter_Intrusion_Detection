seed: 42
device: cuda

model:
  name: yolov8  # xem configs/model.yaml

optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 0.0005

scheduler:
  name: cosine
  warmup_epochs: 3

training:
  epochs: 100
  # batch_size: 16 gay OOM tren RTX 3060 Laptop 6GB VRAM o imgsz=1280 (verify thuc te
  # o 05_training.ipynb). Dung batch=-1 (autobatch cua ultralytics) khi goi model.train()
  # thay vi con so nay - xem notebook 05 de biet ly do (CUDA OOM lam hong context, khong
  # the tu retry batch nho hon trong cung 1 process).
  batch_size: 16
  num_workers: 4
  # image_size: da doi tu [1280, 960] xuong [640, 640] - xem ghi chu trong configs/model.yaml
  # (GPU 6GB VRAM OOM o 1280 ngay ca voi autobatch, verify o 05_training.ipynb).
  image_size: [640, 640]
  amp: true  # mixed precision, tận dụng GPU

early_stopping:
  patience: 15
  monitor: val_map50

checkpoint:
  dir: outputs/checkpoints
  save_best_only: true

logging:
  tensorboard_dir: outputs/tensorboard
  log_dir: outputs/logs
