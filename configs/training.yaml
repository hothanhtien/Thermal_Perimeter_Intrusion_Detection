seed: 42
device: cuda

model:
  name: yolov8  # xem configs/model.yaml

optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 0.0005

scheduler:
  name: cosine
  warmup_epochs: 3

training:
  epochs: 100
  batch_size: 16
  num_workers: 4
  image_size: [1280, 960]
  amp: true  # mixed precision, tận dụng GPU

early_stopping:
  patience: 15
  monitor: val_map50

checkpoint:
  dir: outputs/checkpoints
  save_best_only: true

logging:
  tensorboard_dir: outputs/tensorboard
  log_dir: outputs/logs
