checkpoint: outputs/checkpoints/best.pt
device: cuda
# conf_threshold thấp hơn default (0.25) vì ưu tiên recall - bài toán an ninh:
# bỏ lọt người xâm nhập (false negative) nguy hiểm hơn báo động giả (false positive).
# Tune lại bằng PR-curve ở notebook 06_evaluation.ipynb.
conf_threshold: 0.15
iou_threshold: 0.45
image_size: [1280, 960]
input_dir: data/sample
output_dir: outputs/predictions
